<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma-Herb | Digital Herbarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:wght@400;500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdfaf3;
            --ink: #2b2b2b;
            --leaf: #3e5c3e;
            --accent: #8c6d31;
            --border: #d1c7ac;
            --caution: #a34b3e;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--paper);
            color: var(--ink);
            margin: 0;
            padding: 0;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 3px double var(--accent);
            padding: 20px;
            background-color: #f4efdf;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--leaf);
            margin: 0;
            letter-spacing: 4px;
        }

        .tagline {
            font-size: 1.1rem;
            max-width: 650px;
            margin-top: 15px;
            font-style: italic;
            border-top: 1px solid var(--accent);
            padding-top: 15px;
            color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .grid-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 50px;
            color: var(--leaf);
        }

        .herb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        .herb-card {
            background: white;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .herb-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .card-img-preview {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .herb-card h3 {
            margin: 15px 0 5px 0;
            font-family: 'Playfair Display', serif;
            color: var(--leaf);
        }

        /* --- Detail Overlay --- */
        #detail-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper);
            z-index: 1000;
            overflow-y: auto;
        }

        .detail-wrapper {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border: 1px solid var(--border);
        }

        .close-btn {
            position: sticky;
            top: 10px;
            background: var(--leaf);
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .detail-img {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            background: #fdfaf3;
            margin-bottom: 30px;
            border: 1px solid #eee;
        }

        .section-h {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: var(--leaf);
            border-bottom: 1px solid #eee;
            margin-top: 25px;
            padding-bottom: 5px;
        }

        .info-text { margin: 10px 0; line-height: 1.6; }

        .tax-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .tax-table td { padding: 8px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem;}
        .tax-table td:first-child { font-weight: bold; color: var(--accent); width: 30%; }
    </style>
</head>
<body>

    </header>

    <div class="container">

    </div>

    <div id="detail-view">

            <button class="close-btn" onclick="closeDetail()">← BACK</button>

        const grid = document.getElementById('herbGrid');
        herbs.forEach((h, i) => {
            const card = document.createElement('div');
            card.className = 'herb-card';
            card.innerHTML = `<img src="${h.img}" class="card-img-preview"><h3>${h.name}</h3><p><i>${h.sci}</i></p>`;
            card.onclick = () => showHerb(i);
            grid.appendChild(card);
        });

        function showHerb(index) {
            const h = herbs[index];
            const target = document.getElementById('content-target');
            target.innerHTML = `
                <img src="${h.img}" class="detail-img">
                <h2 style="margin:0; font-family:'Playfair Display'">${h.name}</h2>
                <div style="color:var(--accent); font-style:italic; margin-bottom:20px;">${h.sci}</div>
                
                <div class="section-h">Taxonomy</div>
                <table class="tax-table">
                    ${Object.entries(h.taxonomy).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
                </table>

                <div class="section-h">Botanical Morphology</div>
                <div class="info-text">${h.morphology}</div>

                <div class="section-h">Major Phytochemicals</div>
                <div class="info-text">${h.phytochemicals}</div>

                <div class="section-h">Therapeutic Effects</div>
                <div class="info-text">${h.therapeutic}</div>

                <div class="section-h" style="color:var(--caution)">Safety Cautions</div>
                <div class="info-text"><i>${h.cautions}</i></div>
            `;
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
        }

</body>
</html>
