<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma-Herb | Digital Herbarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:wght@400;500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdfaf3;
            --ink: #2b2b2b;
            --leaf: #3e5c3e;
            --accent: #8c6d31;
            --border: #d1c7ac;
            --caution: #a34b3e;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--paper);
            color: var(--ink);
            margin: 0;
            padding: 0;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
        }

        /* --- Header --- */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 3px double var(--accent);
            padding: 20px;
            background: linear-gradient(rgba(253, 250, 243, 0.7), rgba(253, 250, 243, 0.7)), 
                        url('https://images.unsplash.com/photo-1515549832467-8c442fc299b4?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 5.5rem);
            color: var(--leaf);
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .tagline {
            font-size: 1.1rem;
            max-width: 650px;
            margin-top: 15px;
            font-style: italic;
            border-top: 1px solid var(--accent);
            padding-top: 15px;
            color: var(--accent);
        }

        /* --- Catalog --- */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .grid-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 50px;
            color: var(--leaf);
        }

        .herb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .herb-card {
            background: white;
            padding: 0;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.03);
        }

        .herb-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--leaf);
        }

        .card-img-preview {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
            filter: sepia(20%);
        }

        .herb-card h3 {
            margin: 15px 0 5px 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--leaf);
        }

        .herb-card p {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 20px;
            font-style: italic;
        }

        /* --- Full Screen Detail Overlay --- */
        #detail-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper);
            z-index: 1000;
            overflow-y: auto;
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
        }

        .detail-wrapper {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 50px;
            box-shadow: 0 0 60px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .close-btn {
            position: sticky;
            top: 10px;
            background: var(--leaf);
            color: white;
            border: none;
            padding: 12px 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            z-index: 10;
            margin-bottom: 20px;
        }

        .detail-hero-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border: 8px solid #fdfaf3;
            outline: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .section-h {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: var(--leaf);
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
            margin-top: 35px;
        }

        .info-text { margin: 12px 0 25px 0; line-height: 1.8; text-align: justify; }

        .tax-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .tax-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .tax-table td:first-child { font-weight: bold; color: var(--accent); width: 30%; }

        @media (max-width: 600px) {
            .detail-wrapper { padding: 25px 15px; margin: 0; }
            .detail-hero-img { height: 250px; }
        }
    </style>
</head>

</html>
